<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Galaxmeet · 摄影观星助手</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.css"/>
<script src="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070810;
  --surface:rgba(255,255,255,.035);
  --surface2:rgba(255,255,255,.06);
  --surface3:rgba(255,255,255,.09);
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --text:#eeeef0;
  --text2:#a8a8b0;
  --text3:#55555e;
  --primary:#3b82f6;
  --primary-soft:rgba(59,130,246,.14);
  --green:#34d399;
  --green-soft:rgba(52,211,153,.11);
  --yellow:#fbbf24;
  --yellow-soft:rgba(251,191,36,.11);
  --red:#f87171;
  --red-soft:rgba(248,113,113,.11);
  --purple:#a78bfa;
  --purple-soft:rgba(167,139,250,.11);
  --orange:#fb923c;
  --orange-soft:rgba(251,146,60,.11);
  --r:13px;
  --r-sm:9px;
  --blur:blur(24px) saturate(160%);
}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans','Noto Sans SC',-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif;
  height:100vh;overflow:hidden;display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;letter-spacing:-.01em;
}
/* topbar */
.topbar{height:50px;background:rgba(7,8,16,.78);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:12px;z-index:1000;flex-shrink:0}
.logo{font-size:15px;font-weight:700;letter-spacing:-.4px;color:var(--text);white-space:nowrap;display:flex;align-items:center;gap:6px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--primary);box-shadow:0 0 8px rgba(59,130,246,.6);flex-shrink:0}
.search-wrap{flex:1;max-width:360px;position:relative}
.search-wrap input{width:100%;padding:7px 32px 7px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;outline:none;transition:border-color .2s,background .2s;font-family:inherit}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:rgba(59,130,246,.5);background:var(--surface3)}
.search-icon{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--text3);cursor:pointer;font-size:14px;user-select:none;line-height:1}
#searchDrop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:rgba(28,28,30,.95);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:var(--r);max-height:300px;overflow-y:auto;z-index:2000;display:none;box-shadow:0 20px 60px rgba(0,0,0,.7)}
.sr-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;display:flex;align-items:center;gap:9px}
.sr-item:last-child{border-bottom:none}
.sr-item:hover,.sr-item.sel{background:var(--surface2)}
.sr-icon{font-size:13px;flex-shrink:0;opacity:.7}
.sr-name{font-size:13px;font-weight:500;letter-spacing:-.1px}
.sr-addr{font-size:11px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;gap:6px;align-items:center;margin-left:auto}
.icon-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:9px;background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;position:relative;flex-shrink:0;user-select:none}
.icon-btn:hover{background:var(--surface3);border-color:var(--border2);color:var(--text)}
.icon-btn.active{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}
.hov-wrap{position:relative}
.hov-bridge{position:absolute;top:100%;left:0;right:0;height:8px;z-index:2999}
.hov-wrap .hov-drop{position:absolute;top:calc(100% + 8px);right:0;background:rgba(28,28,30,.96);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:var(--r);padding:8px;z-index:3000;display:none;box-shadow:0 20px 60px rgba(0,0,0,.7);min-width:220px}
.hov-wrap:hover .hov-bridge,.hov-wrap:hover .hov-drop{display:block}
.dd-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;padding:0 6px}
.dd-item{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:400;letter-spacing:-.1px;transition:background .1s;color:var(--text);position:relative}
.dd-item:hover{background:var(--surface2)}
.dd-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;opacity:.85}
.dd-arrow{margin-left:auto;color:var(--text3);font-size:10px}
.dd-sep{height:1px;background:var(--border);margin:5px 0}
.dd-row{display:flex;justify-content:space-between;align-items:center;padding:7px 8px;gap:10px;border-radius:9px}
.dd-row:hover{background:var(--surface2)}
.dd-label{font-size:13px;font-weight:400;letter-spacing:-.1px}
.toggle{width:38px;height:22px;border-radius:11px;background:var(--text3);cursor:pointer;position:relative;transition:background .25s;border:0;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .25s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{left:19px}
.dd-btn{width:100%;padding:7px 8px;border-radius:9px;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:400;margin-top:4px;transition:background .15s;text-align:left;letter-spacing:-.1px;font-family:inherit}
.dd-btn:hover{background:var(--surface3)}
.dd-btn.danger{color:var(--red)}
.submenu{position:absolute;right:calc(100% + 6px);top:0;background:rgba(28,28,30,.96);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:var(--r);padding:8px;min-width:160px;box-shadow:0 20px 60px rgba(0,0,0,.7);display:none;z-index:4000}
.dd-item:hover>.submenu{display:block}
.user-info-row{display:flex;align-items:center;gap:10px;padding:6px 6px 10px;border-bottom:1px solid var(--border);margin-bottom:4px}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#0a84ff,#bf5af2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.user-name{font-size:13px;font-weight:600;letter-spacing:-.2px}
.user-email{font-size:11px;color:var(--text3);margin-top:1px}
.main{flex:1;display:flex;overflow:hidden;position:relative}
#map{flex:1;height:100%;min-width:0}
#sidePanel{width:320px;background:rgba(8,9,12,.88);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .3s cubic-bezier(.4,0,.2,1);position:relative}
#sidePanel.collapsed{width:0;border-left:none}
#panelTab{position:absolute;left:-26px;top:50%;transform:translateY(-50%);width:26px;height:56px;background:rgba(8,9,12,.88);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border);border-right:none;border-radius:10px 0 0 10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--text3);z-index:10;opacity:0;transition:opacity .2s,color .15s}
#sidePanel:hover #panelTab,#panelTab:hover{opacity:1}
#panelTab:hover{color:var(--text2)}
.panel-header{padding:10px 12px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-shrink:0}
.panel-tabs{display:flex;gap:2px;flex:1;background:var(--surface2);border-radius:9px;padding:3px}
.ptab{flex:1;padding:5px 8px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);transition:all .15s;border:0;background:none;white-space:nowrap;letter-spacing:-.1px}
.ptab.active{background:var(--surface3);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.panel-acts{display:flex;gap:4px;flex-shrink:0}
.card-nav{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 0;flex-shrink:0}
.nav-arrow{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.nav-arrow:hover{background:var(--surface3);border-color:var(--border2);color:var(--text)}
.nav-arrow:disabled{opacity:.25;cursor:not-allowed}
.nav-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);transition:all .15s}
.nav-dot.on{background:var(--primary);width:14px;border-radius:3px}
.panel-body{flex:1;overflow:hidden;position:relative}
#cardPages{display:flex;height:100%;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.card-page{min-width:100%;width:100%;height:100%;overflow-y:auto;padding:10px 10px 16px;flex-shrink:0}
.pt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.pt-card-head{padding:10px 12px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--border);gap:8px}
.pt-name{font-size:13px;font-weight:600;letter-spacing:-.2px;line-height:1.4}
.pt-coord{font-size:10px;color:var(--text3);margin-top:3px;font-variant-numeric:tabular-nums}
.pt-actions{display:flex;gap:3px;flex-shrink:0;margin-top:1px}
.pt-act{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pt-act:hover{background:var(--surface2);color:var(--text2);border-color:var(--border2)}
.pt-act.del:hover{color:var(--red);border-color:rgba(255,69,58,.3);background:var(--red-soft)}
.pt-act.fav-on{color:var(--yellow);border-color:rgba(255,214,10,.3);background:var(--yellow-soft)}
.pt-body{padding:10px}
.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.data-cell{background:var(--surface2);border-radius:var(--r-sm);padding:10px 11px;border:1px solid var(--border)}
.dc-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.dc-val{font-size:20px;font-weight:700;line-height:1;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
.dc-unit{font-size:11px;color:var(--text3);margin-left:1px;font-weight:400;letter-spacing:0}
.dc-sub{font-size:10px;color:var(--text3);margin-top:4px;font-weight:400}
.dc-val.good{color:var(--green)}.dc-val.warn{color:var(--yellow)}.dc-val.bad{color:var(--red)}.dc-val.purple{color:var(--purple)}
.timeline{margin-bottom:10px}
.tl-label{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.tl-bar{height:4px;border-radius:2px;background:var(--surface3);position:relative;overflow:hidden;margin-bottom:5px}
.tl-fill{height:100%;border-radius:2px;position:absolute}
.tl-sun{background:linear-gradient(90deg,var(--orange),var(--yellow))}
.tl-times{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-variant-numeric:tabular-nums}
.bortle-bar{display:flex;gap:2px;margin:6px 0 4px}
.bortle-seg{flex:1;height:4px;border-radius:2px}
.bortle-label{font-size:10px;color:var(--text3);display:flex;justify-content:space-between}
.share-row-btn{width:100%;display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:10px;border:none;background:none;color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;transition:background .12s;text-align:left}
.share-row-btn:hover{background:var(--surface2)}
.share-row-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.share-row-label{flex:1;font-weight:500;letter-spacing:-.1px}
.share-row-arrow{color:var(--text3);font-size:16px;line-height:1}
#starMapWrap{position:relative;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);background:#020408;cursor:grab;margin-bottom:8px}
#starMapWrap:active{cursor:grabbing}
#starCanvas{display:block;width:100%}
.star-info-pop{position:absolute;background:rgba(28,28,30,.95);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:var(--r-sm);padding:10px 12px;font-size:11px;z-index:10;pointer-events:none;max-width:180px;box-shadow:0 12px 32px rgba(0,0,0,.6);display:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:5000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:rgba(28,28,30,.97);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:20px;padding:24px;width:100%;max-width:390px;box-shadow:0 32px 80px rgba(0,0,0,.7);position:relative;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;letter-spacing:-.3px}
.modal-tabs{display:flex;gap:3px;margin-bottom:18px;background:var(--surface2);border-radius:10px;padding:3px}
.modal-tab{flex:1;padding:7px;border-radius:8px;border:0;background:none;color:var(--text3);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;letter-spacing:-.1px;font-family:inherit}
.modal-tab.active{background:var(--surface3);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:500;color:var(--text3);margin-bottom:6px;display:block;letter-spacing:-.1px}
.form-input{width:100%;padding:10px 13px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;outline:none;transition:border-color .2s,background .2s;letter-spacing:-.1px;font-family:inherit}
.form-input:focus{border-color:var(--primary);background:var(--surface3)}
.form-input::placeholder{color:var(--text3)}
.form-row{display:flex;gap:8px}
.form-row .form-input{flex:1}
.send-code-btn{padding:10px 13px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--primary);cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;transition:all .15s;flex-shrink:0;font-family:inherit}
.send-code-btn:hover{background:var(--surface3)}
.send-code-btn:disabled{color:var(--text3);cursor:not-allowed}
.submit-btn{width:100%;padding:12px;border-radius:12px;border:0;background:var(--primary);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .15s,transform .1s;letter-spacing:-.2px;font-family:inherit}
.submit-btn:hover{opacity:.9}
.submit-btn:active{transform:scale(.98)}
.form-error{font-size:12px;color:var(--red);margin-top:8px;min-height:16px;letter-spacing:-.1px}
.form-switch{font-size:12px;color:var(--text3);text-align:center;margin-top:12px}
.form-switch a{color:var(--primary);cursor:pointer;font-weight:500}
.modal-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;border:none;background:var(--surface3);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;transition:all .15s}
.modal-close:hover{color:var(--text)}
.profile-avatar-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#0a84ff,#bf5af2);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;margin-bottom:8px;overflow:hidden;flex-shrink:0}
.profile-avatar img{width:72px;height:72px;border-radius:50%;object-fit:cover;display:block}
.profile-avatar-hint{font-size:11px;color:var(--text3);font-weight:400}
.fstar{font-size:24px;cursor:pointer;opacity:.25;transition:opacity .15s;color:var(--yellow)}
.fstar.on{opacity:1}
.hist-item{display:flex;align-items:center;gap:9px;padding:9px 8px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px;transition:background .1s;border-radius:9px}
.hist-item:hover{background:var(--surface2)}
.avatar-upload-wrap{position:relative;display:inline-block;cursor:pointer}
.avatar-upload-wrap:hover .avatar-overlay{opacity:1}
.avatar-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:10px;color:#fff;font-weight:600}
.avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.cropper-view-box,.cropper-face{border-radius:50%}
.cropper-view-box{outline:2px solid var(--primary);outline-color:rgba(10,132,255,.8)}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(44,44,46,.95);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:20px;padding:9px 18px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap;letter-spacing:-.1px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{color:var(--green)}
#toast.error{color:var(--red)}
.spinner{display:inline-block;width:12px;height:12px;border:1.5px solid var(--surface3);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 16px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.6}
.empty-text{font-size:12px;line-height:1.8;font-weight:400;letter-spacing:-.1px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
</style>
</head>
<body>

<!-- topbar -->
<div class="topbar">
  <div class="logo">&#10022; Galaxmeet</div>
  <div class="search-wrap">
    <input id="searchInput" placeholder="输入地名即可搜索…" autocomplete="off" spellcheck="false"/>
    <span class="search-icon" id="btnSearch">&#9906;</span>
    <div id="searchDrop"></div>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" id="btnLocate" title="定位到我">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="8" stroke-dasharray="3 2"/>
        <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
      </svg>
    </button>
    <button class="icon-btn" id="btnLock" title="锁定/解锁视角">&#128275;</button>
    <div class="hov-wrap">
      <button class="icon-btn" title="设置">&#9881;</button>
      <div class="hov-bridge"></div>
      <div class="hov-drop" id="settingsPanel">
        <div class="dd-title">显示设置</div>
        <div class="dd-row"><span class="dd-label">温度 °F</span><button class="toggle" id="toggleUnit"></button></div>
        <div class="dd-row"><span class="dd-label">24小时制</span><button class="toggle on" id="toggle24h"></button></div>
        <div class="dd-row"><span class="dd-label">卫星标注层</span><button class="toggle on" id="toggleLabel"></button></div>
        <div class="dd-sep"></div>
        <button class="dd-btn danger" id="btnClearAll">&#128465; 清空所有地点</button>
      </div>
    </div>
    <div class="hov-wrap">
      <button class="icon-btn" id="btnUser" title="账号">&#128100;</button>
      <div class="hov-bridge"></div>
      <div class="hov-drop" id="userMenu" style="min-width:220px"></div>
    </div>
  </div>
</div>


<!-- modals -->
<div class="modal-overlay" id="authModal">
  <div class="modal">

<script>
const API="http://127.0.0.1:8003";
const AMAP_KEY="8be337053e092994b64fdbe81879acba";

function toast(msg,type="",dur=2800){
  const el=document.getElementById("toast");
  el.textContent=msg;el.className="show "+(type||"");
  clearTimeout(el._t);el._t=setTimeout(()=>el.className="",dur);
}
function closeModal(id){document.getElementById(id).classList.remove("open")}
function openModal(id){document.getElementById(id).classList.add("open")}

document.querySelectorAll(".modal-overlay").forEach(o=>{
  o.addEventListener("click",e=>{if(e.target===o)o.classList.remove("open");});
});

let _token=localStorage.getItem("sm_token")||"";
let _user=JSON.parse(localStorage.getItem("sm_user")||"null");
function authHeaders(){return _token?{Authorization:"Bearer "+_token}:{}}
async function apiFetch(path,opts={}){
  const res=await fetch(API+path,{headers:{"Content-Type":"application/json",...authHeaders(),...(opts.headers||{})},...opts});
  const data=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(data.detail||"请求失败");
  return data;
}

function jsonp(url,timeout=8000){
  return new Promise((resolve,reject)=>{
    const cb="_gm_"+Date.now()+"_"+Math.random().toString(36).slice(2);
    const s=document.createElement("script");
    const t=setTimeout(()=>{cleanup();reject(new Error("超时"));},timeout);
    function cleanup(){clearTimeout(t);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);}
    s.src=url+(url.includes("?")?"&":"?")+"callback="+cb+"&output=JSON";
    window[cb]=data=>{cleanup();resolve(data);};
    s.onerror=()=>{cleanup();reject(new Error("网络错误"));};
    document.head.appendChild(s);
  });
}

const map=L.map('map',{zoomControl:false,preferCanvas:true}).setView([35,105],5);
L.control.zoom({position:'bottomright'}).addTo(map);

// 页面加载后自动请求定位，飞到用户所在地
(function initLocate(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const{latitude:lat,longitude:lng}=pos.coords;
      map.setView([lat,lng],13);
    },
    ()=>{/* 用户拒绝或失败，保持默认视角 */},
    {timeout:8000,maximumAge:60000}
  );
})();
// 全球卫星底图（Esri）
const tileGlobal=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'© Esri'}).addTo(map);
// 高德卫星（仅中国区域启用）
const tileBase=L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,attribution:'© 高德卫星'});
let tileLabel=L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18,opacity:.9});

// 判断是否在中国大陆范围内
function inChina(lat,lng){return lat>18&&lat<54&&lng>73&&lng<135;}

function updateTileSource(){
  const c=map.getCenter();
  if(inChina(c.lat,c.lng)){
    if(!map.hasLayer(tileBase))tileBase.addTo(map);
    if(CFG.label&&!map.hasLayer(tileLabel))tileLabel.addTo(map);
  } else {
    if(map.hasLayer(tileBase))map.removeLayer(tileBase);
    if(map.hasLayer(tileLabel))map.removeLayer(tileLabel);
  }
}
map.on('moveend',updateTileSource);

const CFG={fahrenheit:false,h24:true,label:true};

function escH(s){return String(s||"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function fmtTemp(c){return CFG.fahrenheit?Math.round(c*9/5+32)+"°F":Math.round(c)+"°C"}
function fmtTime(iso){if(!iso)return"--";const d=new Date(iso);return CFG.h24?d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:false}):d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:true})}
function dayFrac(iso){if(!iso)return 0;const d=new Date(iso);return(d.getHours()*60+d.getMinutes())/(24*60)}
function moonPhase(date){
  const known=new Date("2000-01-06T18:14:00Z"),cycle=29.530588853;
  const phase=(((date-known)/(1000*60*60*24)%cycle)+cycle)%cycle,pct=phase/cycle;
  let name,emoji;
  if(pct<.03||pct>.97){name="新月";emoji="🌑"}else if(pct<.22){name="娥眉月";emoji="🌒"}
  else if(pct<.28){name="上弦月";emoji="🌓"}else if(pct<.47){name="盈凸月";emoji="🌔"}
  else if(pct<.53){name="满月";emoji="🌕"}else if(pct<.72){name="亏凸月";emoji="🌖"}
  else if(pct<.78){name="下弦月";emoji="🌗"}else{name="残月";emoji="🌘"}
  return{name,emoji,illum:Math.round(Math.abs(Math.cos(pct*2*Math.PI))*100)};
}
function estimateBortle(lat,lng){
  const cities=[[39.9,116.4,21],[31.2,121.5,24],[23.1,113.3,15],[30.6,104.1,16],[22.5,114.1,13],[29.6,106.5,8],[32.1,118.8,8],[30.3,120.2,7],[36.1,120.4,9],[34.3,108.9,8]];
  let min=9;
  for(const[clat,clng,pop]of cities){const d=Math.sqrt((lat-clat)**2+(lng-clng)**2)*111;const b=Math.max(1,Math.min(9,9-Math.log2(pop*80/Math.max(d,5)+1)*1.2));if(b<min)min=b;}
  return Math.round(min);
}
function bortleDesc(b){
  const d=["","极暗天空","真正暗天","农村天空","农村/郊区","郊区天空","明亮郊区","郊区/城市","城市天空","市中心"];
  const c=["","#30d158","#0a84ff","#a5d6ff","#d2a8ff","#ff9f0a","#ffd60a","#ff6961","#ff453a","#ff453a"];
  return{desc:d[b]||"未知",color:c[b]||"#636366"};
}
function wmoDesc(code){
  if(code===0)return{text:"晴空万里",icon:"☀️"};if(code<=2)return{text:"少云",icon:"🌤️"};
  if(code===3)return{text:"多云",icon:"☁️"};if(code<=49)return{text:"雾/霾",icon:"🌫️"};
  if(code<=59)return{text:"毛毛雨",icon:"🌦️"};if(code<=69)return{text:"雨",icon:"🌧️"};
  if(code<=79)return{text:"雪",icon:"❄️"};if(code<=84)return{text:"阵雨",icon:"🌦️"};
  return{text:"雷暴",icon:"⛈️"};
}
function windDir(deg){return["北","东北","东","东南","南","西南","西","西北"][Math.round(deg/45)%8]}
function visClass(km){return km>=20?"good":km>=10?"":km>=5?"warn":"bad"}
function cloudClass(pct){return pct<=20?"good":pct<=50?"warn":"bad"}
</script>

<script>
let _history=JSON.parse(localStorage.getItem("gm_history")||"[]");
let _favs=JSON.parse(localStorage.getItem("gm_favs")||"[]");
function saveHistory(name,lat,lng){
  _history=_history.filter(h=>!(Math.abs(h.lat-lat)<0.001&&Math.abs(h.lng-lng)<0.001));
  _history.unshift({name,lat,lng,time:Date.now()});
  if(_history.length>30)_history=_history.slice(0,30);
  localStorage.setItem("gm_history",JSON.stringify(_history));
}
function toggleFav(name,lat,lng){
  const idx=_favs.findIndex(f=>Math.abs(f.lat-lat)<0.001&&Math.abs(f.lng-lng)<0.001);
  if(idx>=0){_favs.splice(idx,1);localStorage.setItem("gm_favs",JSON.stringify(_favs));return false;}
  _favs.unshift({name,lat,lng,time:Date.now()});
  localStorage.setItem("gm_favs",JSON.stringify(_favs));return true;
}
function isFav(lat,lng){return _favs.some(f=>Math.abs(f.lat-lat)<0.001&&Math.abs(f.lng-lng)<0.001)}

async function fetchPointData(lat,lng){
  const[weather,sunR,elevR]=await Promise.allSettled([
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,cloud_cover,visibility,wind_speed_10m,wind_direction_10m&daily=sunrise,sunset&timezone=auto&forecast_days=1`).then(r=>r.json()),
    fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0&date=today`).then(r=>r.json()),
    fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lng}`).then(r=>r.json())
  ]);
  return{
    weather:weather.status==="fulfilled"?weather.value:null,
    sunTimes:sunR.status==="fulfilled"?sunR.value?.results:null,
    elev:elevR.status==="fulfilled"?elevR.value?.elevation?.[0]:null,
    moon:moonPhase(new Date()),
    bortle:estimateBortle(lat,lng)
  };
}

let points=[],nextId=1,_curPage=0;

function updateNav(){
  const nav=document.getElementById("cardNav");
  const dots=document.getElementById("navDots");
  const prev=document.getElementById("navPrev");
  const next=document.getElementById("navNext");
  const n=points.length;
  nav.style.display=n>1?"flex":"none";
  dots.innerHTML=points.map((_,i)=>`<div class="nav-dot${i===_curPage?" on":""}"></div>`).join("");
  prev.disabled=_curPage===0;
  next.disabled=_curPage===n-1;
  document.getElementById("cardPages").style.transform=`translateX(-${_curPage*100}%)`;
}

document.getElementById("navPrev").onclick=()=>{if(_curPage>0){_curPage--;updateNav();}};
document.getElementById("navNext").onclick=()=>{if(_curPage<points.length-1){_curPage++;updateNav();}};

function renderCard(pt){
  const el=document.getElementById("card-"+pt.id);if(!el)return;
  const d=pt.data;
  if(!d){el.querySelector(".pt-body").innerHTML=`<div style="color:var(--text3);font-size:12px;padding:6px 0"><span class="spinner"></span>加载中…</div>`;return;}
  const cur=d.weather?.current||{},daily=d.weather?.daily||{},sun=d.sunTimes;
  const wmo=wmoDesc(cur.weather_code),vis=(cur.visibility||0)/1000,cloud=cur.cloud_cover||0;
  const bortle=d.bortle||5,bd=bortleDesc(bortle),moon=d.moon,elev=d.elev!=null?Math.round(d.elev)+"m":"--";
  const sunrise=sun?.sunrise?fmtTime(sun.sunrise):(daily.sunrise?.[0]?fmtTime(daily.sunrise[0]):"--");
  const sunset=sun?.sunset?fmtTime(sun.sunset):(daily.sunset?.[0]?fmtTime(daily.sunset[0]):"--");
  const srDate=sun?.sunrise?new Date(sun.sunrise):null,ssDate=sun?.sunset?new Date(sun.sunset):null;
  const goldenAM=srDate?fmtTime(new Date(srDate-30*60000))+"–"+fmtTime(new Date(srDate+30*60000)):"--";
  const goldenPM=ssDate?fmtTime(new Date(ssDate-30*60000))+"–"+fmtTime(new Date(ssDate+30*60000)):"--";
  const blueAM=srDate?fmtTime(new Date(srDate-60*60000))+"–"+fmtTime(new Date(srDate-20*60000)):"--";
  const bluePM=ssDate?fmtTime(new Date(ssDate+20*60000))+"–"+fmtTime(new Date(ssDate+60*60000)):"--";
  const srFrac=sun?.sunrise?dayFrac(sun.sunrise)*100:25,ssFrac=sun?.sunset?dayFrac(sun.sunset)*100:75;
  const score=Math.round((cloud<=20?30:cloud<=50?15:0)+(vis>=20?25:vis>=10?15:vis>=5?5:0)+(bortle<=3?25:bortle<=5?15:bortle<=7?5:0)+(cur.weather_code===0?20:cur.weather_code<=2?12:cur.weather_code<=3?5:0));
  const sc=score>=75?"good":score>=45?"warn":"bad";
  el.querySelector(".pt-body").innerHTML=`
    <div class="data-grid">
      <div class="data-cell"><div class="dc-label">综合评分</div><div class="dc-val ${sc}">${score}<span class="dc-unit">/100</span></div><div class="dc-sub">${score>=75?"适合出行":score>=45?"一般条件":"不建议"}</div></div>
      <div class="data-cell"><div class="dc-label">天气</div><div class="dc-val" style="font-size:22px">${wmo.icon}</div><div class="dc-sub">${wmo.text} · ${fmtTemp(cur.temperature_2m??0)}</div></div>
      <div class="data-cell"><div class="dc-label">云量</div><div class="dc-val ${cloudClass(cloud)}">${cloud}<span class="dc-unit">%</span></div><div class="dc-sub">${cloud<=20?"晴朗":cloud<=50?"部分遮蔽":"大量云层"}</div></div>
      <div class="data-cell"><div class="dc-label">能见度</div><div class="dc-val ${visClass(vis)}">${vis>=1?vis.toFixed(0):vis.toFixed(1)}<span class="dc-unit">km</span></div><div class="dc-sub">${vis>=20?"极佳":vis>=10?"良好":vis>=5?"一般":"较差"}</div></div>
      <div class="data-cell"><div class="dc-label">风速/向</div><div class="dc-val">${Math.round(cur.wind_speed_10m??0)}<span class="dc-unit">km/h</span></div><div class="dc-sub">${windDir(cur.wind_direction_10m??0)}风</div></div>
      <div class="data-cell"><div class="dc-label">海拔</div><div class="dc-val" style="font-size:16px">${elev}</div><div class="dc-sub">高程</div></div>
      <div class="data-cell"><div class="dc-label">光污染</div><div class="dc-val" style="color:${bd.color};font-size:14px">Bortle ${bortle}</div><div class="dc-sub">${bd.desc}</div></div>
      <div class="data-cell"><div class="dc-label">月相</div><div class="dc-val purple" style="font-size:20px">${moon.emoji}</div><div class="dc-sub">${moon.name} · ${moon.illum}%</div></div>
    </div>
    <div class="timeline"><div class="tl-label">☀️ 日照</div><div class="tl-bar"><div class="tl-fill tl-sun" style="left:${srFrac}%;width:${Math.max(0,ssFrac-srFrac)}%"></div></div><div class="tl-times"><span>日出 ${sunrise}</span><span>日落 ${sunset}</span></div></div>
    <div class="timeline"><div class="tl-label">🌅 黄金时段</div><div class="tl-times" style="margin-bottom:4px"><span style="color:var(--orange)">晨 ${goldenAM}</span><span style="color:var(--orange)">昏 ${goldenPM}</span></div><div class="tl-label" style="margin-top:5px">🌆 蓝调时段</div><div class="tl-times"><span style="color:var(--primary)">晨 ${blueAM}</span><span style="color:var(--primary)">昏 ${bluePM}</span></div></div>
    <div class="timeline"><div class="tl-label">🌃 暗天质量</div><div class="bortle-bar">${[1,2,3,4,5,6,7,8,9].map(i=>`<div class="bortle-seg" style="background:${i<=bortle?bd.color:'var(--border)'}"></div>`).join("")}</div><div class="bortle-label"><span>暗1</span><span>亮9</span></div></div>
    <div style="font-size:10px;color:var(--text3);margin-top:7px;line-height:1.7">湿度 ${cur.relative_humidity_2m??'--'}% · 体感 ${fmtTemp(cur.apparent_temperature??0)} · ${pt.lat.toFixed(4)},${pt.lng.toFixed(4)}</div>
    ${_user?`<button class="dd-btn" style="margin-top:8px" onclick="savePoint(${pt.id})">&#9729; 保存到云端</button>`:''}
  `;
}

async function savePoint(ptId){
  const pt=points.find(p=>p.id===ptId);if(!pt)return;
  try{await apiFetch("/api/points",{method:"POST",body:JSON.stringify({name:pt.name,lat:pt.lat,lng:pt.lng,note:""})});toast("已保存到云端","success");}
  catch(e){toast(e.message,"error");}
}

function makeCardPage(pt){
  const page=document.createElement("div");
  page.className="card-page";page.id="page-"+pt.id;
  const favOn=isFav(pt.lat,pt.lng);
  page.innerHTML=`
    <div class="pt-card" id="card-${pt.id}">
      <div class="pt-card-head">
        <div><div class="pt-name">${escH(pt.name)}</div><div class="pt-coord">${pt.lat.toFixed(5)}, ${pt.lng.toFixed(5)}</div></div>
        <div class="pt-actions">
          <button class="pt-act fav-btn${favOn?' fav-on':''}" data-id="${pt.id}" title="收藏">&#9733;</button>
          <button class="pt-act" onclick="map.setView([${pt.lat},${pt.lng}],16)" title="定位">&#9678;</button>
          <button class="pt-act del" title="删除">&#10005;</button>
        </div>
      </div>
      <div class="pt-body"><div style="color:var(--text3);font-size:12px;padding:6px 0"><span class="spinner"></span>正在获取数据…</div></div>
    </div>`;
  page.querySelector(".pt-act.del").onclick=()=>removePoint(pt.id);
  page.querySelector(".fav-btn").onclick=()=>{
    const added=toggleFav(pt.name,pt.lat,pt.lng);
    page.querySelector(".fav-btn").classList.toggle("fav-on",added);
    toast(added?"已收藏":"已取消收藏",added?"success":"");
  };
  return page;
}

async function addPoint(lat,lng,name){
  const id=nextId++;
  const marker=L.circleMarker([lat,lng],{radius:7,color:"#0a84ff",fillColor:"#0a84ff",fillOpacity:.9,weight:2}).addTo(map);
  marker.bindPopup(`<b>${escH(name)}</b><br/><span style="color:#636366;font-size:11px">${lat.toFixed(5)}, ${lng.toFixed(5)}</span>`);
  const pt={id,name,lat,lng,marker,data:null};
  points.push(pt);
  saveHistory(name,lat,lng);
  document.getElementById("sidePanel").classList.remove("collapsed");
  const emptyPage=document.getElementById("page-empty");
  if(emptyPage)emptyPage.remove();
  const pages=document.getElementById("cardPages");
  pages.appendChild(makeCardPage(pt));
  _curPage=points.length-1;
  updateNav();
  try{pt.data=await fetchPointData(lat,lng);}catch(e){pt.data={};}
  renderCard(pt);
  if(document.querySelector('.ptab[data-tab="starmap"]')?.classList.contains("active"))drawStarMap(lat,lng);
}

function removePoint(id){
  const idx=points.findIndex(p=>p.id===id);if(idx===-1)return;
  map.removeLayer(points[idx].marker);points.splice(idx,1);
  document.getElementById("page-"+id)?.remove();
  if(!points.length){
    const pages=document.getElementById("cardPages");
    pages.innerHTML=`<div class="card-page" id="page-empty"><div class="empty-state"><div class="empty-icon">&#127756;</div><div class="empty-text">点击地图或搜索地点<br/>获取摄影 / 观星参数</div></div></div>`;
  }
  _curPage=Math.min(_curPage,Math.max(0,points.length-1));
  updateNav();
}
</script>

<script>
let _searchTimer=null,_searchResults=[],_selIdx=-1;

async function doSearch(q){
  q=(q||document.getElementById("searchInput").value||"").trim();
  if(!q)return;
  const drop=document.getElementById("searchDrop");
  drop.style.display="block";
  drop.innerHTML=`<div class="sr-item"><span class="spinner"></span>搜索中…</div>`;
  _searchResults=[];_selIdx=-1;
  try{
    const seen=new Set();
    const add=(name,addr,lat,lng,icon="📍")=>{
      if(!name||!lat||!lng||isNaN(lat)||isNaN(lng))return;
      const k=`${lat.toFixed(3)},${lng.toFixed(3)}`;
      if(seen.has(k))return;seen.add(k);
      _searchResults.push({name,addr,lat,lng,icon});
    };
    const[tipsR,poiR,geoR]=await Promise.allSettled([
      jsonp(`https://restapi.amap.com/v3/assistant/inputtips?key=${AMAP_KEY}&keywords=${encodeURIComponent(q)}&datatype=all`),
      jsonp(`https://restapi.amap.com/v3/place/text?key=${AMAP_KEY}&keywords=${encodeURIComponent(q)}&offset=15&page=1`),
      jsonp(`https://restapi.amap.com/v3/geocode/geo?key=${AMAP_KEY}&address=${encodeURIComponent(q)}`)
    ]);
    if(tipsR.status==="fulfilled"&&tipsR.value?.status==="1")
      (tipsR.value.tips||[]).filter(t=>t.location&&t.location!=="[]").forEach(t=>{
        const[lng,lat]=t.location.split(",").map(Number);
        add(t.name,t.district||t.address||"",lat,lng,"📍");
      });
    if(poiR.status==="fulfilled"&&poiR.value?.status==="1")
      (poiR.value.pois||[]).forEach(p=>{
        if(!p.location)return;const[lng,lat]=p.location.split(",").map(Number);
        const icon=p.type?.includes("风景")||p.type?.includes("公园")?"🏔️":p.type?.includes("餐")?"🍜":"📍";
        add(p.name,p.address||p.pname||"",lat,lng,icon);
      });
    if(geoR.status==="fulfilled"&&geoR.value?.status==="1")
      (geoR.value.geocodes||[]).forEach(g=>{
        if(!g.location)return;const[lng,lat]=g.location.split(",").map(Number);
        add(g.formatted_address||q,g.province+(g.city||""),lat,lng,"🏙️");
      });
    if(!_searchResults.length){drop.innerHTML=`<div class="sr-item" style="color:var(--text3)">没有找到结果，换个关键词试试</div>`;return;}
    renderDrop();
  }catch(err){
    drop.innerHTML=`<div class="sr-item" style="color:var(--red)">搜索失败：${escH(err.message)}</div>`;
  }
}

function renderDrop(){
  const drop=document.getElementById("searchDrop");
  drop.innerHTML=_searchResults.slice(0,20).map((it,i)=>`
    <div class="sr-item${i===_selIdx?" sel":""}" data-i="${i}">
      <span class="sr-icon">${it.icon}</span>
      <div><div class="sr-name">${escH(it.name)}</div><div class="sr-addr">${escH(it.addr)}</div></div>
    </div>`).join("");
  drop.onclick=e=>{const row=e.target.closest(".sr-item[data-i]");if(row)pickResult(+row.dataset.i);};
}

function pickResult(i){
  const it=_searchResults[i];if(!it)return;
  map.setView([it.lat,it.lng],16);
  addPoint(it.lat,it.lng,it.name);
  document.getElementById("searchDrop").style.display="none";
  document.getElementById("searchInput").value=it.name;
}

const si=document.getElementById("searchInput");
si.addEventListener("input",e=>{
  clearTimeout(_searchTimer);
  const q=e.target.value.trim();
  if(q.length>=1)_searchTimer=setTimeout(()=>doSearch(q),200);
  else document.getElementById("searchDrop").style.display="none";
});
si.addEventListener("keydown",e=>{
  if(e.key==="ArrowDown"){e.preventDefault();_selIdx=Math.min(_selIdx+1,_searchResults.length-1);renderDrop();}
  else if(e.key==="ArrowUp"){e.preventDefault();_selIdx=Math.max(_selIdx-1,0);renderDrop();}
  else if(e.key==="Enter"){clearTimeout(_searchTimer);if(_selIdx>=0)pickResult(_selIdx);else doSearch();}
  else if(e.key==="Escape")document.getElementById("searchDrop").style.display="none";
});
document.getElementById("btnSearch").onclick=()=>{clearTimeout(_searchTimer);doSearch();};
document.addEventListener("click",e=>{
  if(!e.target.closest(".search-wrap"))document.getElementById("searchDrop").style.display="none";
});

map.on("click",async e=>{
  const{lat,lng}=e.latlng;
  const pendingId=nextId;
  addPoint(lat,lng,"定位中…");
  try{
    const d=await jsonp(`https://restapi.amap.com/v3/geocode/regeo?key=${AMAP_KEY}&location=${lng.toFixed(6)},${lat.toFixed(6)}&extensions=base`);
    const addr=d?.regeocode?.formatted_address;
    if(addr){
      const pt=points.find(p=>p.id===pendingId);
      if(pt){
        pt.name=addr;
        const nameEl=document.querySelector(`#card-${pt.id} .pt-name`);
        if(nameEl)nameEl.textContent=addr;
        pt.marker.getPopup()?.setContent(`<b>${escH(addr)}</b><br/><span style="color:#636366;font-size:11px">${lat.toFixed(5)}, ${lng.toFixed(5)}</span>`);
      }
    }
  }catch(err){}
});

let _locked=false;
document.getElementById("btnLock").onclick=function(){
  _locked=!_locked;
  this.textContent=_locked?"🔒":"🔓";
  this.classList.toggle("active",_locked);
  if(_locked){map.dragging.disable();map.scrollWheelZoom.disable();map.doubleClickZoom.disable();toast("视角已锁定");}
  else{map.dragging.enable();map.scrollWheelZoom.enable();map.doubleClickZoom.enable();toast("视角已解锁");}
};

document.getElementById("btnLocate").onclick=()=>{
  if(!navigator.geolocation){toast("浏览器不支持定位","error");return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{map.setView([pos.coords.latitude,pos.coords.longitude],14);addPoint(pos.coords.latitude,pos.coords.longitude,"我的位置");},
    ()=>toast("定位失败，请允许定位权限","error")
  );
};

document.getElementById("toggleUnit").onclick=function(){CFG.fahrenheit=!CFG.fahrenheit;this.classList.toggle("on",CFG.fahrenheit);points.forEach(p=>renderCard(p));};
document.getElementById("toggle24h").onclick=function(){CFG.h24=!CFG.h24;this.classList.toggle("on",CFG.h24);points.forEach(p=>renderCard(p));};
document.getElementById("toggleLabel").onclick=function(){CFG.label=!CFG.label;this.classList.toggle("on",CFG.label);updateTileSource();};
document.getElementById("btnClearAll").onclick=()=>{if(!confirm("清空所有地点？"))return;[...points].forEach(p=>removePoint(p.id));};

const sidePanel=document.getElementById("sidePanel");
document.getElementById("panelTab").onclick=()=>{
  sidePanel.classList.toggle("collapsed");
  document.getElementById("panelTab").textContent=sidePanel.classList.contains("collapsed")?"▶":"◀";
};

document.querySelectorAll(".ptab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".ptab").forEach(x=>x.classList.remove("active"));t.classList.add("active");
    if(t.dataset.tab==="starmap"){
      document.getElementById("cardNav").style.display="none";
      document.querySelector(".panel-body").innerHTML=`
        <div style="padding:10px">
          <div style="font-size:11px;color:var(--text3);margin-bottom:8px">拖拽旋转 · 滚轮缩放 · 点击星座查看详情</div>
          <div id="starMapWrap"><canvas id="starCanvas"></canvas><div class="star-info-pop" id="starInfoPop"></div></div>
        </div>`;
      const lastPt=points[points.length-1];
      drawStarMap(lastPt?.lat??35,lastPt?.lng??105);
    } else {
      document.querySelector(".panel-body").innerHTML=`<div id="cardPages" style="display:flex;height:100%;transition:transform .3s cubic-bezier(.4,0,.2,1)"></div>`;
      if(!points.length){
        document.getElementById("cardPages").innerHTML=`<div class="card-page" id="page-empty"><div class="empty-state"><div class="empty-icon">&#127756;</div><div class="empty-text">点击地图或搜索地点<br/>获取摄影 / 观星参数</div></div></div>`;
      } else {
        points.forEach(pt=>{document.getElementById("cardPages").appendChild(makeCardPage(pt));renderCard(pt);});
      }
      updateNav();
    }
  };
});

document.getElementById("btnShare").onclick=()=>{
  const pt=points[_curPage];
  if(!pt){toast("请先选择一个地点","error");return;}
  document.getElementById("shareInfo").textContent="📍 "+pt.name;
  document.getElementById("shareQR").style.display="none";
  openModal("shareModal");
};

function doShare(type){
  const pt=points[_curPage];if(!pt)return;
  const text="📍 "+pt.name+"\n坐标："+pt.lat.toFixed(5)+", "+pt.lng.toFixed(5)+"\n来自 Galaxmeet 摄影观星助手";
  const url="https://www.amap.com/search?query="+encodeURIComponent(pt.name)+"&center="+pt.lng+","+pt.lat;
  if(type==="copy"){
    navigator.clipboard.writeText(url).then(()=>toast("链接已复制","success")).catch(()=>{
      const ta=document.createElement("textarea");ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();toast("链接已复制","success");
    });
  } else if(type==="text"){
    navigator.clipboard.writeText(text).catch(()=>{const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();});
    toast("文字已复制","success");
  } else if(type==="file"){
    const a=document.createElement("a");a.href="data:text/plain;charset=utf-8,"+encodeURIComponent(text+"\n"+url);a.download="galaxmeet-"+pt.name+".txt";a.click();toast("已导出");
  } else if(type==="qr"){
    const qrDiv=document.getElementById("shareQR");
    qrDiv.style.display="block";
    qrDiv.innerHTML=`<img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(url)}" style="border-radius:8px" alt="QR"/>`;
  }
}

document.getElementById("btnFav").onclick=()=>{
  const pt=points[_curPage];if(!pt){toast("请先选择一个地点","error");return;}
  const added=toggleFav(pt.name,pt.lat,pt.lng);
  document.getElementById("btnFav").classList.toggle("active",added);
  const favBtn=document.querySelector(`.fav-btn[data-id="${pt.id}"]`);
  if(favBtn)favBtn.classList.toggle("fav-on",added);
  toast(added?"已收藏":"已取消收藏",added?"success":"");
};
</script>

<script>
let _authTab="login";
function openAuthModal(tab="login"){
  _authTab=tab;openModal("authModal");
  document.querySelectorAll(".modal-tab").forEach(t=>t.classList.toggle("active",t.dataset.auth===tab));
  renderAuthForm(tab);
}
document.querySelectorAll(".modal-tab").forEach(t=>t.onclick=()=>{_authTab=t.dataset.auth;document.querySelectorAll(".modal-tab").forEach(x=>x.classList.toggle("active",x===t));renderAuthForm(t.dataset.auth);});

function startCodeTimer(btnId){
  let s=60;const btn=document.getElementById(btnId);if(!btn)return;
  btn.disabled=true;btn.textContent=s+"s";
  const iv=setInterval(()=>{s--;if(s<=0){clearInterval(iv);btn.disabled=false;btn.textContent="发送验证码";}else btn.textContent=s+"s";},1000);
}
async function sendCode(email,purpose,btnId){
  if(!email){toast("请输入邮箱","error");return;}
  const btn=document.getElementById(btnId);if(btn){btn.disabled=true;btn.textContent="发送中…";}
  try{
    await apiFetch("/api/email/send",{method:"POST",body:JSON.stringify({email,purpose})});
    toast("验证码已发送，请查收邮件","success");startCodeTimer(btnId);
  }catch(e){toast(e.message,"error");if(btn){btn.disabled=false;btn.textContent="发送验证码";}}
}

function renderAuthForm(tab){
  const root=document.getElementById("authForm");
  if(tab==="login"){
    root.innerHTML=`
      <div class="form-group"><label class="form-label">邮箱</label><input class="form-input" id="af_email" type="email" placeholder="请输入邮箱"/></div>
      <div class="form-group"><label class="form-label">密码</label><input class="form-input" id="af_pw" type="password" placeholder="请输入密码"/></div>
      <div class="form-error" id="af_err"></div>
      <button class="submit-btn" id="af_submit">登录</button>
      <div class="form-switch" style="margin-top:10px">没有账号？<a onclick="openAuthModal('register')">立即注册</a> · <a onclick="openAuthModal('reset')" style="color:var(--text3)">忘记密码？</a></div>`;
    const submit=()=>{
      const email=document.getElementById("af_email").value.trim(),pw=document.getElementById("af_pw").value;
      const err=document.getElementById("af_err");err.textContent="";
      if(!email||!pw){err.textContent="请填写邮箱和密码";return;}
      apiFetch("/api/auth/login",{method:"POST",body:JSON.stringify({email,password:pw})})
        .then(d=>{_token=d.token;_user=d.user;localStorage.setItem("sm_token",_token);localStorage.setItem("sm_user",JSON.stringify(_user));closeModal("authModal");renderUserMenu();toast("登录成功","success");})
        .catch(e=>{err.textContent=e.message;});
    };
    document.getElementById("af_submit").onclick=submit;
    document.getElementById("af_pw").onkeydown=e=>{if(e.key==="Enter")submit();};
  } else if(tab==="register"){
    root.innerHTML=`
      <div class="form-group"><label class="form-label">邮箱</label><input class="form-input" id="af_email" type="email" placeholder="请输入邮箱"/></div>
      <div class="form-group"><label class="form-label">验证码</label><div class="form-row"><input class="form-input" id="af_code" placeholder="6位验证码" maxlength="6"/><button class="send-code-btn" id="af_sendCode">发送验证码</button></div></div>
      <div class="form-group"><label class="form-label">用户名</label><input class="form-input" id="af_uname" placeholder="2-20位" maxlength="20"/></div>
      <div class="form-group"><label class="form-label">密码</label><input class="form-input" id="af_pw" type="password" placeholder="至少6位"/></div>
      <div class="form-error" id="af_err"></div>
      <button class="submit-btn" id="af_submit">注册</button>
      <div class="form-switch">已有账号？<a onclick="openAuthModal('login')">立即登录</a></div>`;
    document.getElementById("af_sendCode").onclick=()=>sendCode(document.getElementById("af_email").value.trim(),"register","af_sendCode");
    document.getElementById("af_submit").onclick=()=>{
      const email=document.getElementById("af_email").value.trim(),code=document.getElementById("af_code").value.trim(),username=document.getElementById("af_uname").value.trim(),password=document.getElementById("af_pw").value;
      const err=document.getElementById("af_err");err.textContent="";
      if(!email||!code||!username||!password){err.textContent="请填写所有字段";return;}
      apiFetch("/api/auth/register",{method:"POST",body:JSON.stringify({email,code,username,password})})
        .then(d=>{_token=d.token;_user=d.user;localStorage.setItem("sm_token",_token);localStorage.setItem("sm_user",JSON.stringify(_user));closeModal("authModal");renderUserMenu();toast("注册成功，欢迎！","success");})
        .catch(e=>{err.textContent=e.message;});
    };
  } else {
    root.innerHTML=`
      <div class="form-group"><label class="form-label">邮箱</label><input class="form-input" id="af_email" type="email" placeholder="请输入邮箱"/></div>
      <div class="form-group"><label class="form-label">验证码</label><div class="form-row"><input class="form-input" id="af_code" placeholder="6位验证码" maxlength="6"/><button class="send-code-btn" id="af_sendCode">发送验证码</button></div></div>
      <div class="form-group"><label class="form-label">新密码</label><input class="form-input" id="af_pw" type="password" placeholder="至少6位"/></div>
      <div class="form-error" id="af_err"></div>
      <button class="submit-btn" id="af_submit">重置密码</button>`;
    document.getElementById("af_sendCode").onclick=()=>sendCode(document.getElementById("af_email").value.trim(),"reset","af_sendCode");
    document.getElementById("af_submit").onclick=()=>{
      const email=document.getElementById("af_email").value.trim(),code=document.getElementById("af_code").value.trim(),new_password=document.getElementById("af_pw").value;
      const err=document.getElementById("af_err");err.textContent="";
      apiFetch("/api/auth/reset-password",{method:"POST",body:JSON.stringify({email,code,new_password})})
        .then(()=>{toast("密码已重置","success");openAuthModal("login");})
        .catch(e=>{err.textContent=e.message;});
    };
  }
}

function openProfileModal(){
  if(!_user)return;openModal("profileModal");
  const initials=(_user.username||"U").slice(0,1).toUpperCase();
  const avatarSrc=_user.avatar||"";
  const avatarHTML=avatarSrc?`<img src="${avatarSrc}" alt="avatar"/>`:`<span>${initials}</span>`;
  document.getElementById("profileForm").innerHTML=`
    <div class="profile-avatar-wrap">
      <label class="avatar-upload-wrap" title="点击上传头像">
        <div class="profile-avatar" id="pf_avatarPreview">${avatarHTML}</div>
        <div class="avatar-overlay">更换头像</div>
        <input type="file" id="pf_avatarInput" accept="image/*" style="display:none"/>
      </label>
      <div class="profile-avatar-hint" style="margin-top:6px">点击头像更换图片</div>
    </div>
    <div class="form-group"><label class="form-label">用户名</label><input class="form-input" id="pf_uname" value="${escH(_user.username)}" maxlength="20"/></div>
    <div class="form-group"><label class="form-label">个人简介</label><textarea class="form-input" id="pf_bio" rows="3" maxlength="200">${escH(_user.bio||"")}</textarea></div>
    <div class="form-group"><label class="form-label">邮箱</label><input class="form-input" value="${escH(_user.email||"")}" disabled style="opacity:.4"/></div>
    <div class="form-error" id="pf_err"></div>
    <button class="submit-btn" id="pf_submit">保存修改</button>`;
  document.getElementById("pf_avatarInput").onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>10*1024*1024){toast("图片不能超过10MB","error");return;}
    const reader=new FileReader();
    reader.onload=ev=>{openCropModal(ev.target.result);};
    reader.readAsDataURL(file);
    e.target.value="";
  };
  document.getElementById("pf_submit").onclick=()=>{
    const username=document.getElementById("pf_uname").value.trim(),bio=document.getElementById("pf_bio").value.trim();
    apiFetch("/api/me",{method:"PATCH",body:JSON.stringify({username,bio})})
      .then(d=>{_user=d;localStorage.setItem("sm_user",JSON.stringify(_user));renderUserMenu();closeModal("profileModal");toast("资料已更新","success");})
      .catch(e=>{document.getElementById("pf_err").textContent=e.message;});
  };
}

function openChangePwModal(){

    <div class="form-group"><label class="form-label">邮箱</label><input class="form-input" id="cp_email" type="email" value="${escH(_user?.email||"")}"/></div>
    <div class="form-group"><label class="form-label">验证码</label><div class="form-row"><input class="form-input" id="cp_code" placeholder="6位验证码" maxlength="6"/><button class="send-code-btn" id="cp_send">发送验证码</button></div></div>

let _fRating=0;
document.querySelectorAll(".fstar").forEach(s=>{

document.getElementById("feedbackSubmit").onclick=()=>{

function openHistoryModal(){
  openModal("historyModal");
  const list=document.getElementById("historyList");
  if(!_history.length){list.innerHTML=`<div class="empty-state"><div class="empty-icon">&#128336;</div><div class="empty-text">暂无历史记录</div></div>`;return;}
  list.innerHTML=_history.map((h,i)=>`
    <div class="hist-item" data-i="${i}">
      <span>📍</span>
      <div style="flex:1"><div style="font-size:12px;font-weight:600">${escH(h.name)}</div><div style="font-size:10px;color:var(--text3)">${h.lat.toFixed(4)}, ${h.lng.toFixed(4)}</div></div>
      <span style="font-size:10px;color:var(--text3)">${new Date(h.time).toLocaleDateString()}</span>
    </div>`).join("");
  list.querySelectorAll(".hist-item").forEach(el=>{
    el.onclick=()=>{const h=_history[+el.dataset.i];map.setView([h.lat,h.lng],14);addPoint(h.lat,h.lng,h.name);closeModal("historyModal");};
  });
}

function openFavModal(){
  openModal("favModal");
  const list=document.getElementById("favList");
  if(!_favs.length){list.innerHTML=`<div class="empty-state"><div class="empty-icon">&#9733;</div><div class="empty-text">暂无收藏</div></div>`;return;}
  list.innerHTML=_favs.map((f,i)=>`
    <div class="hist-item" data-i="${i}">
      <span style="color:var(--yellow)">&#9733;</span>
      <div style="flex:1"><div style="font-size:12px;font-weight:600">${escH(f.name)}</div><div style="font-size:10px;color:var(--text3)">${f.lat.toFixed(4)}, ${f.lng.toFixed(4)}</div></div>
      <button style="background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:2px 4px" onclick="event.stopPropagation();_favs.splice(${i},1);localStorage.setItem('gm_favs',JSON.stringify(_favs));this.closest('.hist-item').remove()">&#10005;</button>
    </div>`).join("");
  list.querySelectorAll(".hist-item").forEach(el=>{
    el.onclick=e=>{if(e.target.tagName==="BUTTON")return;const f=_favs[+el.dataset.i];map.setView([f.lat,f.lng],14);addPoint(f.lat,f.lng,f.name);closeModal("favModal");};
  });
}
</script>

<script>
// Avatar Crop
let _cropper=null;
function openCropModal(src){
  const img=document.getElementById("cropImg");
  img.src=src;
  if(_cropper){_cropper.destroy();_cropper=null;}
  document.getElementById("cropModal").classList.add("open");
  img.onload=()=>{
    _cropper=new Cropper(img,{aspectRatio:1,viewMode:1,dragMode:"move",autoCropArea:0.8,cropBoxResizable:true,cropBoxMovable:true,background:false,modal:true,guides:false,highlight:false});
  };
  document.getElementById("cropConfirm").onclick=async()=>{
    if(!_cropper)return;
    const canvas=_cropper.getCroppedCanvas({width:256,height:256,imageSmoothingQuality:"high"});
    canvas.toBlob(async blob=>{
      const form=new FormData();form.append("file",blob,"avatar.png");
      document.getElementById("cropConfirm").textContent="上传中…";
      document.getElementById("cropConfirm").disabled=true;
      try{
        const res=await fetch(API+"/api/me/avatar",{method:"POST",headers:{...authHeaders()},body:form});
        const data=await res.json();
        if(!res.ok)throw new Error(data.detail||"上传失败");
        _user=data;localStorage.setItem("sm_user",JSON.stringify(_user));
        const prev=document.getElementById("pf_avatarPreview");
        if(prev)prev.innerHTML=`<img src="${_user.avatar}" alt="avatar"/>`;
        renderUserMenu();closeCropModal();toast("头像已更新","success");
      }catch(e){toast(e.message,"error");}
      finally{const btn=document.getElementById("cropConfirm");if(btn){btn.textContent="确认裁剪并上传";btn.disabled=false;}}
    },"image/png");
  };
}
function closeCropModal(){
  document.getElementById("cropModal").classList.remove("open");
  if(_cropper){_cropper.destroy();_cropper=null;}
}
function _cropZoom(r){if(_cropper)_cropper.zoom(r);}
function _cropRotate(){if(_cropper)_cropper.rotate(90);}
document.getElementById("cropModal").addEventListener("click",e=>{if(e.target===document.getElementById("cropModal"))closeCropModal();});

// User Menu
function renderUserMenu(){
  const menu=document.getElementById("userMenu");
  if(_user){
    const initials=(_user.username||"U").slice(0,1).toUpperCase();
    const avatarSrc=_user.avatar||"";
    const avatarHTML=avatarSrc?`<img src="${avatarSrc}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" alt="avatar"/>`:`${initials}`;
    const btnUser=document.getElementById("btnUser");
    if(btnUser){
      if(avatarSrc){btnUser.innerHTML=`<img src="${avatarSrc}" style="width:26px;height:26px;border-radius:50%;object-fit:cover" alt="avatar"/>`;btnUser.style.padding="0";}
      else{btnUser.innerHTML="&#128100;";btnUser.style.padding="";}
    }
    menu.innerHTML=`
      <div class="user-info-row">
        <div class="avatar">${avatarHTML}</div>
        <div><div class="user-name">${escH(_user.username)}</div><div class="user-email">${escH(_user.email||"")}</div></div>
      </div>
      <div class="dd-item" id="um_profile"><span class="dd-icon">&#9998;</span>编辑资料</div>
      <div class="dd-item" id="um_history"><span class="dd-icon">&#128336;</span>历史记录</div>
      <div class="dd-item" id="um_favs"><span class="dd-icon">&#9733;</span>收藏</div>
      <div class="dd-item" id="um_feedback"><span class="dd-icon">&#128172;</span>用户反馈与意见</div>
      <div class="dd-sep"></div>
      <div class="dd-item" id="um_security" style="position:relative">
        <span class="dd-icon">&#128274;</span>账号与安全<span class="dd-arrow">&#8249;</span>
        <div class="submenu">
          <div class="dd-item" id="um_changepw"><span class="dd-icon">&#128273;</span>修改密码</div>
          <div class="dd-sep"></div>
          <div class="dd-item" id="um_logout" style="color:var(--red)"><span class="dd-icon">&#128682;</span>退出登录</div>
        </div>
      </div>`;
    menu.querySelector("#um_profile").onclick=openProfileModal;
    menu.querySelector("#um_history").onclick=openHistoryModal;
    menu.querySelector("#um_favs").onclick=openFavModal;
    menu.querySelector("#um_feedback").onclick=()=>openModal("feedbackModal");
    menu.querySelector("#um_changepw").onclick=openChangePwModal;
    menu.querySelector("#um_logout").onclick=()=>{_token="";_user=null;localStorage.removeItem("sm_token");localStorage.removeItem("sm_user");const b=document.getElementById("btnUser");if(b){b.innerHTML="&#128100;";b.style.padding="";}renderUserMenu();toast("已退出登录");};
  } else {
    const btnUser=document.getElementById("btnUser");
    if(btnUser){btnUser.innerHTML="&#128100;";btnUser.style.padding="";}
    menu.innerHTML=`<div class="dd-item" id="um_login"><span class="dd-icon">&#128100;</span>登录 / 注册</div>`;
    menu.querySelector("#um_login").onclick=()=>openAuthModal("login");
  }
}
renderUserMenu();
</script>
